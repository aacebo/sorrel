name: rust_ast
version: 0.0.0
description: Generator-oriented Rust AST schema for public-facing, non-runtime macro APIs. The shape is syn-like and favors dedicated lexical/token leaf nodes (Ident, Lifetime, Lit*) over runtime-oriented scalar representations.
nodes:
  Abi:
    kind: product
    extends: node_base
    fields:
    - name: name
      type: Option<String>
  AssignOp:
    kind: sum
    variants:
    - AddAssign
    - SubAssign
    - MulAssign
    - DivAssign
    - RemAssign
    - BitXorAssign
    - BitAndAssign
    - BitOrAssign
    - ShlAssign
    - ShrAssign
  Asyncness:
    kind: sum
    variants:
    - Sync
    - Async
  AttrStyle:
    kind: sum
    variants:
    - Outer
    - Inner
  BinOp:
    kind: sum
    variants:
    - Add
    - Sub
    - Mul
    - Div
    - Rem
    - And
    - Or
    - BitXor
    - BitAnd
    - BitOr
    - Shl
    - Shr
    - Eq
    - Lt
    - Le
    - Ne
    - Ge
    - Gt
  BoundPolarity:
    kind: sum
    variants:
    - Positive
    - Negative
  Constness:
    kind: sum
    variants:
    - NoConst
    - Const
  Defaultness:
    kind: sum
    variants:
    - Final
    - Default
  DelimiterKind:
    kind: sum
    variants:
    - Paren
    - Bracket
    - Brace
  Ident:
    kind: product
    doc: "An identifier token (e.g. a variable name, type name, or keyword-like ident)."
    extends: node_base
    fields:
    - name: text
      type: String
    - name: raw
      type: bool
      default: false
    meta:
      public_leaf: true
      macro_facing: true
      notes: Generator should treat this as a dedicated identifier token type, not as a plain runtime string.
  LifetimeName:
    kind: product
    extends: node_base
    fields:
    - name: text
      type: String
  LitBool:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: value
      type: bool
  LitByte:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: value
      type: u8
  LitByteStr:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: value
      type: Vec<u8>
  LitCStr:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: value
      type: Vec<u8>
  LitChar:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: value
      type: String
  LitStr:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: value
      type: String
  Movability:
    kind: sum
    variants:
    - Movable
    - Static
  Mutability:
    kind: sum
    doc: "Whether a binding, reference, or pointer is mutable."
    variants:
    - Immutable
    - Mutable
  RangeLimits:
    kind: sum
    variants:
    - HalfOpen
    - Closed
  TraitBoundModifier:
    kind: sum
    variants:
    - None
    - Maybe
  UnOp:
    kind: sum
    variants:
    - Deref
    - Not
    - Neg
  Unsafety:
    kind: sum
    variants:
    - Safe
    - Unsafe
  DocString:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: String
    - name: style
      type: AttrStyle
      meta:
        node: true
  ItemMacroRules:
    kind: product
    submodule: item
    extends: attributed_node_base
    fields:
    - name: ident
      type: Ident
      meta:
        node: true
    - name: rules
      type: crate::TokenStream
  Lifetime:
    kind: product
    doc: "A named lifetime (e.g. `'a`, `'static`)."
    extends: node_base
    fields:
    - name: apostrophe
      type: crate::Span
    - name: ident
      type: Ident
      meta:
        node: true
  LitFloat:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: digits
      type: String
    - name: suffix
      type: Ident
      meta:
        node: true
        wrapper: option
  LitInt:
    kind: product
    submodule: lit
    extends: node_base
    fields:
    - name: digits
      type: String
    - name: suffix
      type: Ident
      meta:
        node: true
        wrapper: option
  Member:
    kind: sum
    variants:
    - name: Named
      fields:
      - name: ident
        type: Ident
        meta:
          node: true
    - name: Unnamed
      fields:
      - name: index
        type: u32
  UseName:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
      meta:
        node: true
  UseRename:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
      meta:
        node: true
    - name: rename
      type: Ident
      meta:
        node: true
  Variadic:
    kind: product
    extends: attributed_node_base
    fields:
    - name: name
      type: Ident
      meta:
        node: true
        wrapper: option
  Label:
    kind: product
    extends: node_base
    fields:
    - name: name
      type: Lifetime
      meta:
        node: true
  LifetimeParam:
    kind: product
    extends: attributed_node_base
    fields:
    - name: lifetime
      type: Lifetime
      meta:
        node: true
    - name: bounds
      type: 'crate::ast::Punctuated<Lifetime, crate::token::Plus>'
  LifetimePredicate:
    kind: product
    extends: node_base
    fields:
    - name: lifetime
      type: Lifetime
      meta:
        node: true
    - name: bounds
      type: 'crate::ast::Punctuated<Lifetime, crate::token::Plus>'
  Receiver:
    kind: product
    extends: attributed_node_base
    fields:
    - name: reference
      type: bool
      default: false
    - name: lifetime
      type: Lifetime
      meta:
        node: true
        wrapper: option
    - name: mutability
      type: Mutability
      meta:
        node: true
  UseBound:
    kind: product
    extends: node_base
    fields:
    - name: lifetimes
      type: 'crate::ast::Punctuated<Lifetime, crate::token::Comma>'
  Lit:
    kind: sum
    submodule: lit
    doc: "A literal value in source code (string, integer, float, byte, char, or boolean)."
    variants:
    - name: Str
      fields:
      - name: value
        type: LitStr
        meta:
          node: true
    - name: ByteStr
      fields:
      - name: value
        type: LitByteStr
        meta:
          node: true
    - name: CStr
      fields:
      - name: value
        type: LitCStr
        meta:
          node: true
    - name: Byte
      fields:
      - name: value
        type: LitByte
        meta:
          node: true
    - name: Char
      fields:
      - name: value
        type: LitChar
        meta:
          node: true
    - name: Int
      fields:
      - name: value
        type: LitInt
        meta:
          node: true
    - name: Float
      fields:
      - name: value
        type: LitFloat
        meta:
          node: true
    - name: Bool
      fields:
      - name: value
        type: LitBool
        meta:
          node: true
    - name: Verbatim
      fields:
      - name: tokens
        type: crate::TokenStream
  ExprContinue:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: label
      type: Label
      meta:
        node: true
        wrapper: option
  BoundLifetimes:
    kind: product
    extends: node_base
    fields:
    - name: params
      type: 'crate::ast::Punctuated<LifetimeParam, crate::token::Comma>'
  ExprLit:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: lit
      type: Lit
      meta:
        node: true
  AngleArgs:
    kind: product
    extends: node_base
    fields:
    - name: args
      type: 'crate::ast::Punctuated<GenericArgument, crate::token::Comma>'
  AssocConstArg:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
      meta:
        node: true
    - name: generics
      type: AngleArgs
      meta:
        node: true
        wrapper: option
    - name: expr
      type: Expr
      meta:
        node: true
  AssocTypeArg:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
      meta:
        node: true
    - name: generics
      type: AngleArgs
      meta:
        node: true
        wrapper: option
    - name: ty
      type: Type
      meta:
        node: true
  AttrArgs:
    kind: sum
    variants:
    - name: Empty
    - name: Delimited
      fields:
      - name: delim
        type: DelimiterKind
        meta:
          node: true
      - name: tokens
        type: crate::TokenStream
    - name: Meta
      fields:
      - name: meta
        type: Box<Meta>
        meta:
          node: true
  Attribute:
    kind: product
    doc: "A Rust attribute (`#[...]` or `#![...]`) applied to an item, expression, or statement."
    extends: node_base
    fields:
    - name: style
      type: AttrStyle
      meta:
        node: true
    - name: path
      type: Path
      meta:
        node: true
    - name: args
      type: AttrArgs
      meta:
        node: true
  BareFnArg:
    kind: product
    extends: attributed_node_base
    fields:
    - name: name
      type: Ident
      meta:
        node: true
        wrapper: option
    - name: ty
      type: Type
      meta:
        node: true
  Block:
    kind: product
    doc: "A braced block of statements (`{ stmt; stmt; expr }`)."
    extends: node_base
    fields:
    - name: stmts
      type: Stmt
      meta:
        node: true
        wrapper: vec
  ClosureParam:
    kind: sum
    variants:
    - name: Typed
      fields:
      - name: pat
        type: Box<Pattern>
        meta:
          node: true
      - name: ty
        type: Box<Type>
        meta:
          node: true
    - name: Inferred
      fields:
      - name: pat
        type: Box<Pattern>
        meta:
          node: true
  ConstParam:
    kind: product
    extends: attributed_node_base
    fields:
    - name: ident
      type: Ident
      meta:
        node: true
    - name: ty
      type: Type
      meta:
        node: true
    - name: default
      type: Expr
      meta:
        node: true
        wrapper: option
  ConstraintArg:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
      meta:
        node: true
    - name: generics
      type: AngleArgs
      meta:
        node: true
        wrapper: option
    - name: bounds
      type: 'crate::ast::Punctuated<TypeBound, crate::token::Plus>'
  Crate:
    kind: product
    extends: node_base
    fields:
    - name: attrs
      type: Attribute
      meta:
        node: true
        wrapper: vec
    - name: items
      type: Item
      meta:
        node: true
        wrapper: vec
  Expr:
    kind: sum
    submodule: expr
    doc: "A Rust expression. The primary recursive node covering all expression forms."
    variants:
    - name: Lit
      fields:
      - name: value
        type: ExprLit
        meta:
          node: true
    - name: Path
      fields:
      - name: value
        type: ExprPath
        meta:
          node: true
    - name: Block
      fields:
      - name: value
        type: ExprBlock
        meta:
          node: true
    - name: Unsafe
      fields:
      - name: value
        type: ExprUnsafe
        meta:
          node: true
    - name: Const
      fields:
      - name: value
        type: ExprConst
        meta:
          node: true
    - name: If
      fields:
      - name: value
        type: ExprIf
        meta:
          node: true
    - name: While
      fields:
      - name: value
        type: ExprWhile
        meta:
          node: true
    - name: ForLoop
      fields:
      - name: value
        type: ExprForLoop
        meta:
          node: true
    - name: Loop
      fields:
      - name: value
        type: ExprLoop
        meta:
          node: true
    - name: Match
      fields:
      - name: value
        type: ExprMatch
        meta:
          node: true
    - name: Closure
      fields:
      - name: value
        type: ExprClosure
        meta:
          node: true
    - name: Async
      fields:
      - name: value
        type: ExprAsync
        meta:
          node: true
    - name: Await
      fields:
      - name: value
        type: ExprAwait
        meta:
          node: true
    - name: Try
      fields:
      - name: value
        type: ExprTry
        meta:
          node: true
    - name: TryBlock
      fields:
      - name: value
        type: ExprTryBlock
        meta:
          node: true
    - name: Yield
      fields:
      - name: value
        type: ExprYield
        meta:
          node: true
    - name: Return
      fields:
      - name: value
        type: ExprReturn
        meta:
          node: true
    - name: Break
      fields:
      - name: value
        type: ExprBreak
        meta:
          node: true
    - name: Continue
      fields:
      - name: value
        type: ExprContinue
        meta:
          node: true
    - name: Call
      fields:
      - name: value
        type: ExprCall
        meta:
          node: true
    - name: MethodCall
      fields:
      - name: value
        type: ExprMethodCall
        meta:
          node: true
    - name: Field
      fields:
      - name: value
        type: ExprField
        meta:
          node: true
    - name: Index
      fields:
      - name: value
        type: ExprIndex
        meta:
          node: true
    - name: Reference
      fields:
      - name: value
        type: ExprReference
        meta:
          node: true
    - name: Unary
      fields:
      - name: value
        type: ExprUnary
        meta:
          node: true
    - name: Binary
      fields:
      - name: value
        type: ExprBinary
        meta:
          node: true
    - name: Assign
      fields:
      - name: value
        type: ExprAssign
        meta:
          node: true
    - name: AssignOp
      fields:
      - name: value
        type: ExprAssignOp
        meta:
          node: true
    - name: Cast
      fields:
      - name: value
        type: ExprCast
        meta:
          node: true
    - name: Type
      fields:
      - name: value
        type: ExprType
        meta:
          node: true
    - name: Let
      fields:
      - name: value
        type: ExprLet
        meta:
          node: true
    - name: Struct
      fields:
      - name: value
        type: ExprStruct
        meta:
          node: true
    - name: Tuple
      fields:
      - name: value
        type: ExprTuple
        meta:
          node: true
    - name: Array
      fields:
      - name: value
        type: ExprArray
        meta:
          node: true
    - name: Repeat
      fields:
      - name: value
        type: ExprRepeat
        meta:
          node: true
    - name: Range
      fields:
      - name: value
        type: ExprRange
        meta:
          node: true
    - name: Macro
      fields:
      - name: value
        type: MacroCall
        meta:
          node: true
    - name: Group
      fields:
      - name: value
        type: ExprGroup
        meta:
          node: true
    - name: Paren
      fields:
      - name: value
        type: ExprParen
        meta:
          node: true
    - name: Infer
    - name: Verbatim
      fields:
      - name: tokens
        type: crate::TokenStream
  ExprArray:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: elems
      type: 'crate::ast::Punctuated<Expr, crate::token::Comma>'
  ExprAssign:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: left
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: right
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprAssignOp:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: left
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: op
      type: AssignOp
      meta:
        node: true
    - name: right
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprAsync:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: capture
      type: bool
      default: false
    - name: block
      type: Block
      meta:
        node: true
  ExprAwait:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: base
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprBinary:
    kind: product
    submodule: expr
    doc: "A binary operation expression (e.g. `a + b`, `x == y`)."
    extends: attributed_node_base
    fields:
    - name: left
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: op
      type: BinOp
      meta:
        node: true
    - name: right
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprBlock:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: label
      type: Label
      meta:
        node: true
        wrapper: option
    - name: block
      type: Block
      meta:
        node: true
  ExprBreak:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: label
      type: Label
      meta:
        node: true
        wrapper: option
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: option_box
  ExprCall:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: func
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: args
      type: 'crate::ast::Punctuated<Expr, crate::token::Comma>'
  ExprCast:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: ty
      type: Type
      meta:
        node: true
        wrapper: box
  ExprClosure:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: lifetimes
      type: BoundLifetimes
      meta:
        node: true
        wrapper: option
    - name: constness
      type: Constness
      meta:
        node: true
    - name: movability
      type: Movability
      meta:
        node: true
    - name: asyncness
      type: Asyncness
      meta:
        node: true
    - name: capture
      type: bool
      default: false
    - name: inputs
      type: 'crate::ast::Punctuated<ClosureParam, crate::token::Comma>'
    - name: output
      type: ReturnType
      meta:
        node: true
    - name: body
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprConst:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: block
      type: Block
      meta:
        node: true
  ExprField:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: base
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: member
      type: Member
      meta:
        node: true
  ExprForLoop:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: label
      type: Label
      meta:
        node: true
        wrapper: option
    - name: pat
      type: Pattern
      meta:
        node: true
        wrapper: box
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: body
      type: Block
      meta:
        node: true
  ExprGroup:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprIf:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: cond
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: then_branch
      type: Block
      meta:
        node: true
    - name: else_branch
      type: Expr
      meta:
        node: true
        wrapper: option_box
  ExprIndex:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: base
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: index
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprLet:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: pat
      type: Pattern
      meta:
        node: true
        wrapper: box
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprLoop:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: label
      type: Label
      meta:
        node: true
        wrapper: option
    - name: body
      type: Block
      meta:
        node: true
  ExprMatch:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: arms
      type: MatchArm
      meta:
        node: true
        wrapper: vec
  ExprMethodCall:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: receiver
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: method
      type: Ident
      meta:
        node: true
    - name: turbofish
      type: AngleArgs
      meta:
        node: true
        wrapper: option
    - name: args
      type: 'crate::ast::Punctuated<Expr, crate::token::Comma>'
  ExprParen:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprPath:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: qself
      type: QSelf
      meta:
        node: true
        wrapper: option
    - name: path
      type: Path
      meta:
        node: true
  ExprRange:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: start
      type: Expr
      meta:
        node: true
        wrapper: option_box
    - name: limits
      type: RangeLimits
      meta:
        node: true
    - name: end
      type: Expr
      meta:
        node: true
        wrapper: option_box
  ExprReference:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: mutability
      type: Mutability
      meta:
        node: true
    - name: expr
      type: Expr
      meta:
        node: true
        wrapper: box
  ExprRepeat:
    kind: product
    submodule: expr
    extends: attributed_node_base
    fields:
    - name: elem
      type: Expr
      meta:
        node: true
        wrapper: box
    - name: len
      type: Expr
      meta:
        node: true
