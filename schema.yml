name: rust_ast
version: 0.0.0
description: Generator-oriented Rust AST schema for public-facing, non-runtime macro APIs. The shape is syn-like and favors dedicated lexical/token leaf nodes (Ident, Lifetime, Lit*) over runtime-oriented scalar representations.
nodes:
  Abi:
    kind: product
    extends: node_base
    fields:
    - name: name
      type: Option<String>
  AssignOp:
    kind: sum
    variants:
    - AddAssign
    - SubAssign
    - MulAssign
    - DivAssign
    - RemAssign
    - BitXorAssign
    - BitAndAssign
    - BitOrAssign
    - ShlAssign
    - ShrAssign
  Asyncness:
    kind: sum
    variants:
    - Sync
    - Async
  AttrStyle:
    kind: sum
    variants:
    - Outer
    - Inner
  BinOp:
    kind: sum
    variants:
    - Add
    - Sub
    - Mul
    - Div
    - Rem
    - And
    - Or
    - BitXor
    - BitAnd
    - BitOr
    - Shl
    - Shr
    - Eq
    - Lt
    - Le
    - Ne
    - Ge
    - Gt
  BoundPolarity:
    kind: sum
    variants:
    - Positive
    - Negative
  Constness:
    kind: sum
    variants:
    - NoConst
    - Const
  Defaultness:
    kind: sum
    variants:
    - Final
    - Default
  DelimiterKind:
    kind: sum
    variants:
    - Paren
    - Bracket
    - Brace
  Ident:
    kind: product
    doc: "An identifier token (e.g. a variable name, type name, or keyword-like ident)."
    extends: node_base
    fields:
    - name: text
      type: String
    - name: raw
      type: bool
      default: false
    meta:
      public_leaf: true
      macro_facing: true
      notes: Generator should treat this as a dedicated identifier token type, not as a plain runtime string.
  LifetimeName:
    kind: product
    extends: node_base
    fields:
    - name: text
      type: String
  LitBool:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: bool
  LitByte:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: u8
  LitByteStr:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: Vec<u8>
  LitCStr:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: Vec<u8>
  LitChar:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: String
  LitStr:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: String
  Movability:
    kind: sum
    variants:
    - Movable
    - Static
  Mutability:
    kind: sum
    doc: "Whether a binding, reference, or pointer is mutable."
    variants:
    - Immutable
    - Mutable
  RangeLimits:
    kind: sum
    variants:
    - HalfOpen
    - Closed
  TraitBoundModifier:
    kind: sum
    variants:
    - None
    - Maybe
  UnOp:
    kind: sum
    variants:
    - Deref
    - Not
    - Neg
  Unsafety:
    kind: sum
    variants:
    - Safe
    - Unsafe
  DocString:
    kind: product
    extends: node_base
    fields:
    - name: value
      type: String
    - name: style
      type: AttrStyle
  ItemMacroRules:
    kind: product
    extends: attributed_node_base
    fields:
    - name: ident
      type: Ident
    - name: rules
      type: TokenStream
  Lifetime:
    kind: product
    doc: "A named lifetime (e.g. `'a`, `'static`)."
    extends: node_base
    fields:
    - name: apostrophe
      type: Span
    - name: ident
      type: Ident
  LitFloat:
    kind: product
    extends: node_base
    fields:
    - name: digits
      type: String
    - name: suffix
      type: Option<Ident>
  LitInt:
    kind: product
    extends: node_base
    fields:
    - name: digits
      type: String
    - name: suffix
      type: Option<Ident>
  Member:
    kind: sum
    variants:
    - name: Named
      fields:
      - name: ident
        type: Ident
    - name: Unnamed
      fields:
      - name: index
        type: u32
  UseName:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
  UseRename:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
    - name: rename
      type: Ident
  Variadic:
    kind: product
    extends: attributed_node_base
    fields:
    - name: name
      type: Option<Ident>
  Label:
    kind: product
    extends: node_base
    fields:
    - name: name
      type: Lifetime
  LifetimeParam:
    kind: product
    extends: attributed_node_base
    fields:
    - name: lifetime
      type: Lifetime
    - name: bounds
      type: 'Punctuated<Lifetime, syn::token::Plus>'
  LifetimePredicate:
    kind: product
    extends: node_base
    fields:
    - name: lifetime
      type: Lifetime
    - name: bounds
      type: 'Punctuated<Lifetime, syn::token::Plus>'
  Receiver:
    kind: product
    extends: attributed_node_base
    fields:
    - name: reference
      type: bool
      default: false
    - name: lifetime
      type: Option<Lifetime>
    - name: mutability
      type: Mutability
  UseBound:
    kind: product
    extends: node_base
    fields:
    - name: lifetimes
      type: 'Punctuated<Lifetime, syn::token::Comma>'
  Lit:
    kind: sum
    doc: "A literal value in source code (string, integer, float, byte, char, or boolean)."
    variants:
    - name: Str
      fields:
      - name: value
        type: LitStr
    - name: ByteStr
      fields:
      - name: value
        type: LitByteStr
    - name: CStr
      fields:
      - name: value
        type: LitCStr
    - name: Byte
      fields:
      - name: value
        type: LitByte
    - name: Char
      fields:
      - name: value
        type: LitChar
    - name: Int
      fields:
      - name: value
        type: LitInt
    - name: Float
      fields:
      - name: value
        type: LitFloat
    - name: Bool
      fields:
      - name: value
        type: LitBool
    - name: Verbatim
      fields:
      - name: tokens
        type: TokenStream
  ExprContinue:
    kind: product
    extends: attributed_node_base
    fields:
    - name: label
      type: Option<Label>
  BoundLifetimes:
    kind: product
    extends: node_base
    fields:
    - name: params
      type: 'Punctuated<LifetimeParam, syn::token::Comma>'
  ExprLit:
    kind: product
    extends: attributed_node_base
    fields:
    - name: lit
      type: Lit
  AngleArgs:
    kind: product
    extends: node_base
    fields:
    - name: args
      type: 'Punctuated<GenericArgument, syn::token::Comma>'
  AssocConstArg:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
    - name: generics
      type: Option<AngleArgs>
    - name: expr
      type: Expr
  AssocTypeArg:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
    - name: generics
      type: Option<AngleArgs>
    - name: ty
      type: Type
  AttrArgs:
    kind: sum
    variants:
    - name: Empty
    - name: Delimited
      fields:
      - name: delim
        type: DelimiterKind
      - name: tokens
        type: TokenStream
    - name: Meta
      fields:
      - name: meta
        type: Meta
  Attribute:
    kind: product
    doc: "A Rust attribute (`#[...]` or `#![...]`) applied to an item, expression, or statement."
    extends: node_base
    fields:
    - name: style
      type: AttrStyle
    - name: path
      type: Path
    - name: args
      type: AttrArgs
  BareFnArg:
    kind: product
    extends: attributed_node_base
    fields:
    - name: name
      type: Option<Ident>
    - name: ty
      type: Type
  Block:
    kind: product
    doc: "A braced block of statements (`{ stmt; stmt; expr }`)."
    extends: node_base
    fields:
    - name: stmts
      type: Vec<Stmt>
  ClosureParam:
    kind: sum
    variants:
    - name: Typed
      fields:
      - name: pat
        type: Pattern
      - name: ty
        type: Type
    - name: Inferred
      fields:
      - name: pat
        type: Pattern
  ConstParam:
    kind: product
    extends: attributed_node_base
    fields:
    - name: ident
      type: Ident
    - name: ty
      type: Type
    - name: default
      type: Option<Expr>
  ConstraintArg:
    kind: product
    extends: node_base
    fields:
    - name: ident
      type: Ident
    - name: generics
      type: Option<AngleArgs>
    - name: bounds
      type: 'Punctuated<TypeBound, syn::token::Plus>'
  Crate:
    kind: product
    extends: node_base
    fields:
    - name: attrs
      type: Vec<Attribute>
    - name: items
      type: Vec<Item>
  Expr:
    kind: sum
    doc: "A Rust expression. The primary recursive node covering all expression forms."
    variants:
    - name: Lit
      fields:
      - name: value
        type: ExprLit
    - name: Path
      fields:
      - name: value
        type: ExprPath
    - name: Block
      fields:
      - name: value
        type: ExprBlock
    - name: Unsafe
      fields:
      - name: value
        type: ExprUnsafe
    - name: Const
      fields:
      - name: value
        type: ExprConst
    - name: If
      fields:
      - name: value
        type: ExprIf
    - name: While
      fields:
      - name: value
        type: ExprWhile
    - name: ForLoop
      fields:
      - name: value
        type: ExprForLoop
    - name: Loop
      fields:
      - name: value
        type: ExprLoop
    - name: Match
      fields:
      - name: value
        type: ExprMatch
    - name: Closure
      fields:
      - name: value
        type: ExprClosure
    - name: Async
      fields:
      - name: value
        type: ExprAsync
    - name: Await
      fields:
      - name: value
        type: ExprAwait
    - name: Try
      fields:
      - name: value
        type: ExprTry
    - name: TryBlock
      fields:
      - name: value
        type: ExprTryBlock
    - name: Yield
      fields:
      - name: value
        type: ExprYield
    - name: Return
      fields:
      - name: value
        type: ExprReturn
    - name: Break
      fields:
      - name: value
        type: ExprBreak
    - name: Continue
      fields:
      - name: value
        type: ExprContinue
    - name: Call
      fields:
      - name: value
        type: ExprCall
    - name: MethodCall
      fields:
      - name: value
        type: ExprMethodCall
    - name: Field
      fields:
      - name: value
        type: ExprField
    - name: Index
      fields:
      - name: value
        type: ExprIndex
    - name: Reference
      fields:
      - name: value
        type: ExprReference
    - name: Unary
      fields:
      - name: value
        type: ExprUnary
    - name: Binary
      fields:
      - name: value
        type: ExprBinary
    - name: Assign
      fields:
      - name: value
        type: ExprAssign
    - name: AssignOp
      fields:
      - name: value
        type: ExprAssignOp
    - name: Cast
      fields:
      - name: value
        type: ExprCast
    - name: Type
      fields:
      - name: value
        type: ExprType
    - name: Let
      fields:
      - name: value
        type: ExprLet
    - name: Struct
      fields:
      - name: value
        type: ExprStruct
    - name: Tuple
      fields:
      - name: value
        type: ExprTuple
    - name: Array
      fields:
      - name: value
        type: ExprArray
    - name: Repeat
      fields:
      - name: value
        type: ExprRepeat
    - name: Range
      fields:
      - name: value
        type: ExprRange
    - name: Macro
      fields:
      - name: value
        type: MacroCall
    - name: Group
      fields:
      - name: value
        type: ExprGroup
    - name: Paren
      fields:
      - name: value
        type: ExprParen
    - name: Infer
    - name: Verbatim
      fields:
      - name: tokens
        type: TokenStream
  ExprArray:
    kind: product
    extends: attributed_node_base
    fields:
    - name: elems
      type: 'Punctuated<Expr, syn::token::Comma>'
  ExprAssign:
    kind: product
    extends: attributed_node_base
    fields:
    - name: left
      type: Box<Expr>
    - name: right
      type: Box<Expr>
  ExprAssignOp:
    kind: product
    extends: attributed_node_base
    fields:
    - name: left
      type: Box<Expr>
    - name: op
      type: AssignOp
    - name: right
      type: Box<Expr>
  ExprAsync:
    kind: product
    extends: attributed_node_base
    fields:
    - name: capture
      type: bool
      default: false
    - name: block
      type: Block
  ExprAwait:
    kind: product
    extends: attributed_node_base
    fields:
    - name: base
      type: Box<Expr>
  ExprBinary:
    kind: product
    doc: "A binary operation expression (e.g. `a + b`, `x == y`)."
    extends: attributed_node_base
    fields:
    - name: left
      type: Box<Expr>
    - name: op
      type: BinOp
    - name: right
      type: Box<Expr>
  ExprBlock:
    kind: product
    extends: attributed_node_base
    fields:
    - name: label
      type: Option<Label>
    - name: block
      type: Block
  ExprBreak:
    kind: product
    extends: attributed_node_base
    fields:
    - name: label
      type: Option<Label>
    - name: expr
      type: Option<Box<Expr>>
  ExprCall:
    kind: product
    extends: attributed_node_base
    fields:
    - name: func
      type: Box<Expr>
    - name: args
      type: 'Punctuated<Expr, syn::token::Comma>'
  ExprCast:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Box<Expr>
    - name: ty
      type: Box<Type>
  ExprClosure:
    kind: product
    extends: attributed_node_base
    fields:
    - name: lifetimes
      type: Option<BoundLifetimes>
    - name: constness
      type: Constness
    - name: movability
      type: Movability
    - name: asyncness
      type: Asyncness
    - name: capture
      type: bool
      default: false
    - name: inputs
      type: 'Punctuated<ClosureParam, syn::token::Comma>'
    - name: output
      type: ReturnType
    - name: body
      type: Box<Expr>
  ExprConst:
    kind: product
    extends: attributed_node_base
    fields:
    - name: block
      type: Block
  ExprField:
    kind: product
    extends: attributed_node_base
    fields:
    - name: base
      type: Box<Expr>
    - name: member
      type: Member
  ExprForLoop:
    kind: product
    extends: attributed_node_base
    fields:
    - name: label
      type: Option<Label>
    - name: pat
      type: Pattern
    - name: expr
      type: Box<Expr>
    - name: body
      type: Block
  ExprGroup:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Box<Expr>
  ExprIf:
    kind: product
    extends: attributed_node_base
    fields:
    - name: cond
      type: Box<Expr>
    - name: then_branch
      type: Block
    - name: else_branch
      type: Option<Box<Expr>>
  ExprIndex:
    kind: product
    extends: attributed_node_base
    fields:
    - name: base
      type: Box<Expr>
    - name: index
      type: Box<Expr>
  ExprLet:
    kind: product
    extends: attributed_node_base
    fields:
    - name: pat
      type: Pattern
    - name: expr
      type: Box<Expr>
  ExprLoop:
    kind: product
    extends: attributed_node_base
    fields:
    - name: label
      type: Option<Label>
    - name: body
      type: Block
  ExprMatch:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Box<Expr>
    - name: arms
      type: Vec<MatchArm>
  ExprMethodCall:
    kind: product
    extends: attributed_node_base
    fields:
    - name: receiver
      type: Box<Expr>
    - name: method
      type: Ident
    - name: turbofish
      type: Option<AngleArgs>
    - name: args
      type: 'Punctuated<Expr, syn::token::Comma>'
  ExprParen:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Box<Expr>
  ExprPath:
    kind: product
    extends: attributed_node_base
    fields:
    - name: qself
      type: Option<QSelf>
    - name: path
      type: Path
  ExprRange:
    kind: product
    extends: attributed_node_base
    fields:
    - name: start
      type: Option<Box<Expr>>
    - name: limits
      type: RangeLimits
    - name: end
      type: Option<Box<Expr>>
  ExprReference:
    kind: product
    extends: attributed_node_base
    fields:
    - name: mutability
      type: Mutability
    - name: expr
      type: Box<Expr>
  ExprRepeat:
    kind: product
    extends: attributed_node_base
    fields:
    - name: elem
      type: Box<Expr>
    - name: len
      type: Box<Expr>
  ExprReturn:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Option<Box<Expr>>
  ExprStruct:
    kind: product
    extends: attributed_node_base
    fields:
    - name: qself
      type: Option<QSelf>
    - name: path
      type: Path
    - name: fields
      type: 'Punctuated<FieldValue, syn::token::Comma>'
    - name: rest
      type: Option<Box<Expr>>
  ExprTry:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Box<Expr>
  ExprTryBlock:
    kind: product
    extends: attributed_node_base
    fields:
    - name: block
      type: Block
  ExprTuple:
    kind: product
    extends: attributed_node_base
    fields:
    - name: elems
      type: 'Punctuated<Expr, syn::token::Comma>'
  ExprType:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Box<Expr>
    - name: ty
      type: Box<Type>
  ExprUnary:
    kind: product
    extends: attributed_node_base
    fields:
    - name: op
      type: UnOp
    - name: expr
      type: Box<Expr>
  ExprUnsafe:
    kind: product
    extends: attributed_node_base
    fields:
    - name: block
      type: Block
  ExprWhile:
    kind: product
    extends: attributed_node_base
    fields:
    - name: label
      type: Option<Label>
    - name: cond
      type: Box<Expr>
    - name: body
      type: Block
  ExprYield:
    kind: product
    extends: attributed_node_base
    fields:
    - name: expr
      type: Option<Box<Expr>>
  FieldDef:
    kind: product
    extends: attributed_node_base
    fields:
    - name: vis
      type: Visibility
    - name: mutability
      type: Mutability
    - name: ident
      type: Option<Ident>
    - name: ty
      type: Type
  FieldValue:
    kind: product
    extends: attributed_node_base
    fields:
    - name: member
      type: Member
    - name: expr
      type: Expr
    - name: shorthand
      type: bool
      default: false
  Fields:
    kind: sum
    variants:
    - name: Named
      fields:
      - name: value
        type: FieldsNamed
    - name: Unnamed
      fields:
      - name: value
        type: FieldsUnnamed
    - name: Unit
  FieldsNamed:
    kind: product
    extends: node_base
    fields:
    - name: fields
      type: 'Punctuated<FieldDef, syn::token::Comma>'
  FieldsUnnamed:
    kind: product
    extends: node_base
    fields:
    - name: fields
      type: 'Punctuated<FieldDef, syn::token::Comma>'
  FnParam:
    kind: sum
    variants:
    - name: Receiver
      fields:
      - name: value
        type: Receiver
    - name: Typed
      fields:
      - name: value
        type: TypedParam
  ForeignItem:
    kind: sum
    variants:
    - name: Fn
      fields:
      - name: value
        type: ForeignItemFn
    - name: Static
      fields:
      - name: value
        type: ForeignItemStatic
    - name: Type
      fields:
      - name: value
        type: ForeignItemType
    - name: Macro
      fields:
      - name: value
        type: ForeignItemMacro
  ForeignItemFn:
    kind: product
    extends: attributed_node_base
    fields:
    - name: vis
      type: Visibility
    - name: sig
      type: Signature
  ForeignItemMacro:
    kind: product
    extends: attributed_node_base
    fields:
    - name: mac
      type: MacroCall
    - name: semi
      type: bool
      default: false
  ForeignItemStatic:
    kind: product
    extends: attributed_node_base
    fields:
    - name: vis
      type: Visibility
    - name: mutability
      type: Mutability
    - name: ident
      type: Ident
    - name: ty
      type: Type
  ForeignItemType:
    kind: product
    extends: attributed_node_base
    fields:
    - name: vis
      type: Visibility
    - name: ident
      type: Ident
    - name: generics
      type: Generics
  GenericArgument:
    kind: sum
    variants:
    - name: Lifetime
      fields:
      - name: value
        type: Lifetime
    - name: Type
      fields:
      - name: value
        type: Type
    - name: Const
      fields:
      - name: value
        type: Expr
    - name: AssocType
      fields:
      - name: value
        type: AssocTypeArg
    - name: AssocConst
      fields:
      - name: value
        type: AssocConstArg
    - name: Constraint
      fields:
      - name: value
        type: ConstraintArg
  GenericParam:
    kind: sum
    variants:
    - name: Lifetime
      fields:
      - name: value
        type: LifetimeParam
    - name: Type
      fields:
      - name: value
        type: TypeParam
    - name: Const
      fields:
      - name: value
        type: ConstParam
  Generics:
    kind: product
    extends: node_base
    fields:
    - name: params
      type: 'Punctuated<GenericParam, syn::token::Comma>'
    - name: where_clause
      type: Option<WhereClause>
  ImplItem:
    kind: sum
    variants:
    - name: Fn
      fields:
      - name: value
        type: ImplItemFn
    - name: Const
      fields:
      - name: value
        type: ImplItemConst
    - name: Type
      fields:
      - name: value
        type: ImplItemType
    - name: Macro
      fields:
      - name: value
        type: ImplItemMacro
  ImplItemConst:
    kind: product
    extends: attributed_node_base
    fields:
    - name: vis
      type: Visibility
    - name: defaultness
      type: Defaultness
    - name: ident
      type: Ident
    - name: generics
      type: Generics
    - name: ty
      type: Type
    - name: expr
      type: Expr
  ImplItemFn:
    kind: product
    extends: attributed_node_base
    fields:
    - name: vis
      type: Visibility
    - name: defaultness
      type: Defaultness
    - name: sig
      type: Signature
    - name: body
      type: Block
  ImplItemMacro:
    kind: product
    extends: attributed_node_base
    fields:
